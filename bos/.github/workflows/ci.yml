name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Lint + Test
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: bos } }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check app/ tests/ scripts/ || true  # non-blocking for Phase 1

      - name: Run tests
        env:
          BOS_DB_PATH: /tmp/bos-test.db
          BOS_CHROMA_PATH: /tmp/bos-chroma
          GEMINI_API_KEY: test-key
        run: pytest tests/ -v --tb=short

  build-image:
    name: Build Docker image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: bos
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/brokerage-os:latest
            ghcr.io/${{ github.repository_owner }}/brokerage-os:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
