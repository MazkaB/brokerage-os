apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bos
  namespace: brokerage-os
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bos
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
