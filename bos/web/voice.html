<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">
<title>Brokerage OS - Voice</title>
<style>
  :root {
    --bg: #ffffff; --border: #e5e7eb; --text: #111827; --muted: #6b7280;
    --accent: #2563eb; --success: #16a34a; --danger: #dc2626;
    --surface: #f9fafb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 40px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  h1 { font-size: 20px; margin: 0; }
  .help { color: var(--muted); font-size: 13px; }
  .row { display: flex; gap: 10px; align-items: center; }
  button {
    background: var(--accent); color: #fff; border: none;
    padding: 10px 18px; border-radius: 8px; cursor: pointer;
    font-size: 14px; font-weight: 500; font-family: inherit;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.recording { background: var(--danger); }
  button.recording::before { content: "● "; }
  input {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 8px 10px; border-radius: 6px;
    font-size: 13px; outline: none; width: 320px;
  }
  .status { font-size: 12px; color: var(--muted); }
  .transcript {
    background: var(--surface); border: 1px solid var(--border);
    padding: 12px 16px; border-radius: 8px; width: 500px; min-height: 60px;
    font-size: 14px; line-height: 1.5;
  }
  .response {
    background: #dbeafe; border: 1px solid #93c5fd;
    padding: 12px 16px; border-radius: 8px; width: 500px; min-height: 60px;
    font-size: 14px; line-height: 1.5;
  }
  audio { margin-top: 8px; }
</style>
</head>
<body>
  <h1>Brokerage OS Voice</h1>
  <div class="help">Press Record, speak, then stop. The system transcribes, processes via LangGraph, and replies with audio.</div>

  <div class="row">
    <input id="apiKey" type="password" placeholder="BOS API Key" value="bos-local-dev-key-CHANGE-ME">
  </div>

  <div class="row">
    <button id="recordBtn">Record</button>
    <button id="stopBtn" disabled>Stop</button>
    <span class="status" id="status">Ready</span>
  </div>

  <div>
    <div class="status">Transcript:</div>
    <div class="transcript" id="transcript">(nothing yet)</div>
  </div>

  <div>
    <div class="status">BOS Response:</div>
    <div class="response" id="response">(nothing yet)</div>
    <audio id="audio" controls style="display:none;"></audio>
  </div>

<script>
let mediaRecorder = null;
let audioChunks = [];

const $ = id => document.getElementById(id);

$('recordBtn').onclick = async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = handleStop;
    mediaRecorder.start();
    $('recordBtn').disabled = true;
    $('recordBtn').classList.add('recording');
    $('stopBtn').disabled = false;
    $('status').textContent = 'Recording...';
  } catch (e) {
    $('status').textContent = 'Microphone error: ' + e.message;
  }
};

$('stopBtn').onclick = () => {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
    $('recordBtn').disabled = false;
    $('recordBtn').classList.remove('recording');
    $('stopBtn').disabled = true;
    $('status').textContent = 'Processing...';
  }
};

async function handleStop() {
  const blob = new Blob(audioChunks, { type: 'audio/webm' });
  // Convert webm → wav via AudioContext (browser-native, simple resample)
  const arrayBuf = await blob.arrayBuffer();
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const decoded = await audioCtx.decodeAudioData(arrayBuf);
  const wavBuf = encodeWAV(decoded, 16000);
  const wavBlob = new Blob([wavBuf], { type: 'audio/wav' });

  // Upload to /api/voice/transcribe
  const fd = new FormData();
  fd.append('file', wavBlob, 'recording.wav');
  try {
    const r = await fetch('/api/voice/transcribe', {
      method: 'POST',
      headers: { 'X-API-Key': $('apiKey').value },
      body: fd,
    });
    const data = await r.json();
    $('transcript').textContent = data.text || '(empty)';
    // Now run BOS chat
    if (data.text && !data.text.startsWith('[')) {
      const r2 = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'X-API-Key': $('apiKey').value, 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: data.text, username: 'advisor@bos.local' }),
      });
      const chat = await r2.json();
      $('response').textContent = chat.final_response || '(no response)';
      // Try TTS
      const ttsResp = await fetch(
        '/api/voice/synthesize?text=' + encodeURIComponent((chat.final_response || '').slice(0, 500)),
        { method: 'POST', headers: { 'X-API-Key': $('apiKey').value } }
      );
      if (ttsResp.ok) {
        const audioBlob = await ttsResp.blob();
        $('audio').src = URL.createObjectURL(audioBlob);
        $('audio').style.display = 'block';
        $('audio').play();
      }
    }
    $('status').textContent = 'Done';
  } catch (e) {
    $('status').textContent = 'Error: ' + e.message;
  }
}

function encodeWAV(audioBuffer, targetSampleRate) {
  const numChannels = 1;
  const sampleRate = targetSampleRate;
  const numFrames = Math.ceil(audioBuffer.duration * sampleRate);
  const bytesPerSample = 2;
  const blockAlign = numChannels * bytesPerSample;
  const byteRate = sampleRate * blockAlign;
  const dataSize = numFrames * blockAlign;
  const buffer = new ArrayBuffer(44 + dataSize);
  const view = new DataView(buffer);
  // Offline context to resample
  const offline = new OfflineAudioContext(numChannels, numFrames, sampleRate);
  const src = offline.createBufferSource();
  src.buffer = audioBuffer;
  src.connect(offline.destination);
  src.start();
  return offline.startRendering().then(rendered => {
    const chan = rendered.getChannelData(0);
    // WAV header
    const writeString = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
    writeString(0, 'RIFF');
    view.setUint32(4, 36 + dataSize, true);
    writeString(8, 'WAVE');
    writeString(12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, numChannels, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, byteRate, true);
    view.setUint16(32, blockAlign, true);
    view.setUint16(34, bytesPerSample * 8, true);
    writeString(36, 'data');
    view.setUint32(40, dataSize, true);
    let offset = 44;
    for (let i = 0; i < chan.length; i++, offset += 2) {
      const s = Math.max(-1, Math.min(1, chan[i]));
      view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    }
    return buffer;
  });
}
</script>
</body>
</html>
