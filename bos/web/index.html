<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">
<title>Brokerage OS</title>
<style>
  :root {
    --bg: #ffffff;
    --panel: #ffffff;
    --border: #e5e7eb;
    --text: #111827;
    --muted: #6b7280;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --success: #16a34a;
    --danger: #dc2626;
    --warn: #d97706;
    --surface: #f9fafb;
    --surface-hover: #f3f4f6;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
  }
  body { display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  .sidebar {
    width: 260px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    flex-shrink: 0;
  }
  .brand {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 500;
  }
  .field input, .field select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
    font-family: inherit;
  }
  .field input:focus, .field select:focus {
    border-color: var(--accent);
    background: var(--bg);
  }
  .help-text {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
  }
  .help-text code {
    background: var(--surface);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 11px;
    border: 1px solid var(--border);
  }
  .sidebar-footer {
    margin-top: auto;
    font-size: 11px;
    color: var(--muted);
  }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .topbar {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
  }
  .topbar-title { font-weight: 600; font-size: 14px; }
  .thread-meta {
    font-size: 12px;
    color: var(--muted);
    margin-left: 12px;
    font-variant-numeric: tabular-nums;
  }
  .links a {
    color: var(--muted);
    text-decoration: none;
    margin-left: 16px;
    font-size: 13px;
    transition: color 0.15s;
  }
  .links a:hover { color: var(--accent); }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .msg {
    max-width: 72%;
    padding: 12px 14px;
    border-radius: 10px;
    line-height: 1.55;
    word-wrap: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 2px;
  }
  .msg.bot {
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 2px;
  }
  .msg.bot pre {
    background: #1f2937;
    color: #f9fafb;
    padding: 10px 12px;
    border-radius: 6px;
    overflow-x: auto;
    font-size: 12px;
    margin: 6px 0;
  }
  .msg.trace {
    font-size: 11px;
    color: var(--muted);
    background: transparent;
    border: 1px dashed var(--border);
    padding: 6px 10px;
    max-width: 90%;
    align-self: flex-start;
    border-radius: 6px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .msg.approval {
    background: #fffbeb;
    border-color: #fcd34d;
    color: var(--text);
  }
  .msg.approval button {
    margin-top: 10px;
    margin-right: 8px;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    cursor: pointer;
    font-weight: 500;
    font-size: 12px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-approve {
    background: var(--success) !important;
    color: #fff !important;
    border-color: var(--success) !important;
  }
  .btn-approve:hover { background: #15803d !important; }
  .btn-reject {
    background: var(--danger) !important;
    color: #fff !important;
    border-color: var(--danger) !important;
  }
  .btn-reject:hover { background: #b91c1c !important; }
  .msg.error {
    background: #fef2f2;
    border-color: #fecaca;
    color: #991b1b;
  }

  /* Composer */
  .composer {
    border-top: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--bg);
  }
  .composer textarea {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    resize: none;
    min-height: 48px;
    max-height: 140px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  .composer textarea:focus {
    border-color: var(--accent);
    background: var(--bg);
  }
  .composer button {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
    font-size: 14px;
    font-family: inherit;
    transition: background 0.15s;
  }
  .composer button:hover:not(:disabled) { background: var(--accent-hover); }
  .composer button:disabled { opacity: 0.5; cursor: not-allowed; }
  .composer .attach-btn {
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 12px 14px;
  }
  .composer .attach-btn:hover:not(:disabled) {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--bg);
  }
  .composer input[type=file] { display: none; }
  .attachment-pill {
    font-size: 11px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 999px;
    color: var(--muted);
    margin-right: 6px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
  }
  .attachment-pill:hover { color: var(--danger); }
  .attachments-row {
    padding: 0 24px 6px;
    min-height: 22px;
  }
  .history-row {
    cursor: pointer;
    padding: 6px 8px;
    border-radius: 4px;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    border: 1px solid transparent;
  }
  .history-row:hover { background: var(--surface); color: var(--text); }
  .history-row.active { background: var(--surface); color: var(--text); border-color: var(--border); }
  .history-row .clear-x {
    float: right;
    color: var(--danger);
    margin-left: 6px;
    font-weight: 600;
  }

  /* Suggestions */
  .suggestions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding: 0 24px 10px;
  }
  .suggestion {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    font-family: inherit;
  }
  .suggestion:hover {
    color: var(--text);
    border-color: var(--accent);
    background: var(--bg);
  }

  /* Spinner */
  .spinner {
    width: 13px;
    height: 13px;
    border: 2px solid var(--muted);
    border-top-color: var(--accent);
    border-radius: 50%;
    display: inline-block;
    animation: spin 0.7s linear infinite;
    margin-right: 6px;
    vertical-align: -2px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Markdown rendering */
  .msg.bot h1, .msg.bot h2, .msg.bot h3 {
    margin: 6px 0 4px;
    font-weight: 600;
    line-height: 1.3;
  }
  .msg.bot h3 { font-size: 14px; }
  .msg.bot h2 { font-size: 15px; }
  .msg.bot ul, .msg.bot ol { margin: 6px 0; padding-left: 22px; }
  .msg.bot li { margin: 2px 0; }
  .msg.bot code {
    background: var(--surface-hover);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 12px;
    border: 1px solid var(--border);
  }
  .msg.bot strong { font-weight: 600; }
  .msg.bot p { margin: 6px 0; }
  .msg.bot em { color: var(--muted); }
</style>
</head>
<body>
<aside class="sidebar">
  <div class="brand">Brokerage OS</div>

  <div class="field">
    <label>API Key</label>
    <input id="apiKey" type="password" placeholder="BOS API key" value="bos-local-dev-key-CHANGE-ME">
  </div>

  <div class="field">
    <label>User</label>
    <select id="username">
      <option value="advisor@bos.local">Advisor</option>
      <option value="ops@bos.local">Operations</option>
      <option value="compliance@bos.local">Compliance</option>
      <option value="manager@bos.local">Manager</option>
      <option value="admin@bos.local">Admin</option>
    </select>
  </div>

  <div class="field">
    <label>Thread ID</label>
    <input id="threadId" placeholder="(auto)">
  </div>

  <div class="help-text">
    API key sent via <code>X-API-Key</code> header. Demo users map to roles per the RBAC matrix.
  </div>

  <div class="field">
    <label>Recent conversations</label>
    <div id="historyList" style="display:flex;flex-direction:column;gap:2px;max-height:200px;overflow-y:auto;"></div>
  </div>

  <div class="sidebar-footer">Phase 1</div>
</aside>

<main class="main">
  <header class="topbar">
    <div>
      <span class="topbar-title">Messaging Gateway</span>
      <span class="thread-meta" id="threadMeta"></span>
    </div>
    <div class="links">
      <a href="/admin">Admin</a>
      <a href="/docs">API Docs</a>
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="msg bot">Welcome to the Brokerage Operating System. Try one of the suggestions below to get started.</div>
  </div>

  <div class="suggestions" id="suggestions">
    <button class="suggestion">Summarize AAPL and TSLA</button>
    <button class="suggestion">Open a new retirement account for Jane Doe</button>
    <button class="suggestion">What are our KYC requirements?</button>
    <button class="suggestion">Show my recent clients</button>
    <button class="suggestion">Schedule a meeting with compliance</button>
  </div>

  <div class="attachments-row" id="attachmentsRow"></div>

  <div class="composer">
    <label for="fileInput" class="attach-btn" title="Attach file">+</label>
    <input type="file" id="fileInput">
    <textarea id="message" placeholder="Send a message to the BOS workforce..." rows="1"></textarea>
    <button id="send">Send</button>
  </div>
</main>

<script>
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function renderMarkdown(md) {
  let s = escapeHtml(md);
  s = s.replace(/```([\s\S]*?)```/g, (m, c) => '<pre>'+c+'</pre>');
  s = s.replace(/^### (.*)$/gm, '<h3>$1</h3>')
       .replace(/^## (.*)$/gm, '<h2>$1</h2>')
       .replace(/^# (.*)$/gm, '<h2>$1</h2>');
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
       .replace(/\*([^*]+)\*/g, '<em>$1</em>')
       .replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/^(?:- |\* )(.*)$/gm, '<li>$1</li>');
  s = s.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
  s = s.split(/\n{2,}/).map(p => /</.test(p) ? p : '<p>'+p+'</p>').join('');
  return s;
}

const $ = id => document.getElementById(id);
const messagesEl = $('messages');
const messageInput = $('message');
const sendBtn = $('send');
let pendingFiles = [];

// ---------- Conversation history (localStorage) ----------
function loadHistory() {
  try { return JSON.parse(localStorage.getItem('bos_history') || '[]'); }
  catch (e) { return []; }
}
function saveHistory(list) {
  localStorage.setItem('bos_history', JSON.stringify(list.slice(0, 20)));
}
function saveConversation(threadId, lastMessage) {
  const list = loadHistory().filter(c => c.threadId !== threadId);
  list.unshift({
    threadId,
    lastMessage: lastMessage.slice(0, 60),
    ts: new Date().toISOString(),
  });
  saveHistory(list);
  renderHistory();
}
function renderHistory() {
  const list = loadHistory();
  const el = $('historyList');
  if (!list.length) { el.innerHTML = '<div style="font-size:11px;color:var(--muted);padding:4px 8px">(none yet)</div>'; return; }
  const active = $('threadId').value;
  el.innerHTML = list.map(c =>
    '<div class="history-row ' + (c.threadId === active ? 'active' : '') + '" data-tid="' + c.threadId + '" title="' + escapeHtml(c.lastMessage) + '">' +
      escapeHtml(c.lastMessage || c.threadId) +
      '<span class="clear-x" data-clear="' + c.threadId + '">x</span>' +
    '</div>'
  ).join('');
  el.querySelectorAll('.history-row').forEach(row => {
    row.onclick = (e) => {
      if (e.target.dataset.clear) {
        e.stopPropagation();
        const tid = e.target.dataset.clear;
        saveHistory(loadHistory().filter(c => c.threadId !== tid));
        renderHistory();
        return;
      }
      $('threadId').value = row.dataset.tid;
      renderHistory();
    };
  });
}

// ---------- File attachments ----------
function refreshAttachments() {
  const row = $('attachmentsRow');
  if (!pendingFiles.length) { row.innerHTML = ''; return; }
  row.innerHTML = pendingFiles.map((f, i) =>
    '<span class="attachment-pill" data-i="' + i + '" title="click to remove">' + escapeHtml(f.name) + ' <span style="color:var(--danger)">x</span></span>'
  ).join('');
  row.querySelectorAll('.attachment-pill').forEach(p => {
    p.onclick = () => {
      pendingFiles.splice(parseInt(p.dataset.i), 1);
      refreshAttachments();
    };
  });
}
$('fileInput').onchange = (e) => {
  for (const f of e.target.files) pendingFiles.push(f);
  e.target.value = '';
  refreshAttachments();
};

renderHistory();

function addMsg(html, cls) {
  const el = document.createElement('div');
  el.className = 'msg ' + (cls || 'bot');
  el.innerHTML = html;
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return el;
}

async function api(path, body) {
  const apiKey = $('apiKey').value.trim();
  const res = await fetch(path, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-API-Key': apiKey,
    },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`HTTP ${res.status}: ${txt}`);
  }
  return res.json();
}

async function sendMessage(text) {
  const username = $('username').value;
  const threadId = $('threadId').value.trim() || null;

  // If files were attached, upload them first
  const attachments = [];
  for (const file of pendingFiles) {
    try {
      const fd = new FormData();
      fd.append('file', file);
      const r = await fetch('/api/chat/upload', {
        method: 'POST',
        headers: { 'X-API-Key': $('apiKey').value },
        body: fd,
      });
      if (r.ok) {
        const data = await r.json();
        attachments.push({
          doc_id: data.doc_id,
          filename: data.filename,
          ingested_chunks: data.ingested_chunks,
        });
      }
    } catch (e) {
      console.warn('upload failed', e);
    }
  }
  pendingFiles = [];
  refreshAttachments();

  addMsg(escapeHtml(text), 'user');
  const statusEl = addMsg('<span class="spinner"></span>Working on it...', 'bot');
  sendBtn.disabled = true;
  try {
    const res = await api('/api/chat', { message: text, thread_id: threadId, username, attachments });
    $('threadId').value = res.thread_id;
    $('threadMeta').textContent = `thread: ${res.thread_id} · intent: ${res.intent || '?'} · manager: ${res.manager || '?'}`;
    statusEl.remove();
    saveConversation(res.thread_id, text);

    if (res.trace && res.trace.length) {
      addMsg('Workflow trace: ' + res.trace.join(' → '), 'trace');
    }
    if (res.final_response) {
      addMsg(renderMarkdown(res.final_response), 'bot');
    }
    if (res.needs_approval && res.approval) {
      const ap = res.approval;
      const el = addMsg(
        '<strong>Approval required</strong> (' + escapeHtml(ap.intent) + ')<br>' +
        '<pre style="white-space:pre-wrap">' + escapeHtml(ap.summary || '') + '</pre>' +
        '<button class="btn-approve" data-approval="approved">Approve</button>' +
        '<button class="btn-reject" data-approval="rejected">Reject</button>',
        'approval'
      );
      el.querySelectorAll('button').forEach(btn => {
        btn.onclick = async () => {
          btn.disabled = true;
          try {
            const r = await api('/api/chat/resume', {
              thread_id: res.thread_id,
              decision: btn.dataset.approval,
              note: 'via web UI',
            });
            el.innerHTML = '<em>Decision: ' + escapeHtml(btn.dataset.approval) + '</em>';
            if (r.final_response) addMsg(renderMarkdown(r.final_response), 'bot');
            if (r.trace && r.trace.length) addMsg('Final trace: ' + r.trace.join(' → '), 'trace');
          } catch (e) {
            el.innerHTML = '<strong>Error:</strong> ' + escapeHtml(e.message);
          }
        };
      });
    }
  } catch (e) {
    statusEl.remove();
    addMsg('<strong>Error:</strong> ' + escapeHtml(e.message), 'error');
  } finally {
    sendBtn.disabled = false;
  }
}

sendBtn.onclick = () => {
  const text = messageInput.value.trim();
  if (!text) return;
  messageInput.value = '';
  sendMessage(text);
};

messageInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendBtn.click();
  }
});

document.querySelectorAll('.suggestion').forEach(el => {
  el.onclick = () => { messageInput.value = el.textContent; sendBtn.click(); };
});
</script>
</body>
</html>
